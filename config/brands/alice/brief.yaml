forbidden_phrases:
  # Never use in drafted action_text. Alice's "no AI slop" rule.
  - leverage
  - unlock
  - transform
  - ignite
  - empower
  - supercharge
  - level up
  - move the needle
  - mission-critical
  - best-in-class
  - cutting-edge
  - paradigm shift
  - thought leadership
  - synergize
  - circle back
  - touch base
  - holistic
  - end-to-end (as adjective stack)
  - robust
  - delve
  - landscape
  - tapestry
  - foster
  - showcase (as verb)
  - intricate
  - vibrant

anti_patterns:
  - "Marketing-first framing. Alice is research-first — content comes from what Alice actually does."
  - "AI-formed opinions. Every POV must be a real human's actual view."
  - "Generic content that could come from any AI security startup."
  - "Gimmicks. (Caterpillar was a learning — not to be repeated.)"
  - "Fear-mongering tone. Alice is the trusted partner, not the alarmist."
  - "Manufactured thought leadership. Real findings, real stories, real people."
  - "VC-tweet two-beat pairs ('X is dead. Y is here.')."
  - "Adjective stacks ('innovative, scalable, transformative')."
  - "'We believe...' preambles."

style_anchors:
  - "Wiz: playful, optimistic, security as empowerment."
  - "Irregular: minimal, research-led, the work speaks."
  - "Anthropic: engineers announce in their own names; CEO writes long essays under his own byline."
