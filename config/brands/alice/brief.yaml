          The peer landscape — Anthropic system cards, OpenAI red-team
          papers, Irregular (SOLVE framework), DeepMind safety research,
          MITRE ATLAS updates, abliterated/heretic open-source threats,
          jailbreak techniques. Alice plays here as a research partner
          and benchmark-tester, not a model lab. Track what's being
          tested, what's being broken, and who's publishing.
        keywords:
          - red team ai
          - jailbreak llm
          - system card anthropic
          - system card openai
          - adversarial prompt
          - prompt injection
          - abliterated model
          - heretic model
          - alignment research
          - solve framework irregular
          - mitre atlas
          - ai safety paper

