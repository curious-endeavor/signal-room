# Alice — Signal Room brief
#
# Authored 2026-05-13 from real Alice context in ~/Projects/alice-brand-team/
# (about-alice.md, docs/messaging.md, products/*, projects/2026-q2-*).
# Replaces the first-pass guesses. Dan to review and edit before live runs.

brand:
  name: Alice
  slug: alice
  url: https://alice.io
  former_name: ActiveFence
  one_liner: >
    Trust, safety, and security for the GenAI era. Built on a decade of
    real-world adversarial intelligence from protecting 3 billion users
    across the world's biggest tech platforms. The quiet guardian stepping
    into the light.
  tagline: Advance unafraid
  voice_specimens:
    - "Experience you can't simulate."
    - "100% organic. Our data? Never gets old."
    - "Securing models you haven't even heard of yet."
    - "Trained on real threats, not simulated ones."
    - "No AI bullshit. Real-life stories. Real people."
  audience_primary:
    - Application Security teams (AppSec)
    - CISOs and security leaders at enterprises shipping customer-facing AI
    - Product and AI builders responsible for AI experiences at scale
  audience_secondary:
    - General public / press (brand-awareness funnel via PR-led narratives)
    - Frontier model labs and UGC platforms (top-end peer/customer pool)
  business_model: >
    SaaS platform. Core product = WonderSuite (WonderBuild for pre-launch
    testing, WonderFence for runtime guardrails, WonderCheck for production
    red-teaming, Vector for per-policy guardrail training). Powered by
    Rabbit Hole — proprietary decade-old adversarial intelligence engine.
    Sells to enterprises in regulated verticals + frontier model labs.
  competitive_positioning: >
    Counter to "new AI security startup" → Alice has a decade of real data.
    Counter to "synthetic benchmarks" → 100% organic adversarial samples.
    Counter to "vendor pitch" → research-first, "the work IS the marketing"
    (Irregular benchmark). Counter to "fear-monger" → trusted partner who
    lets you advance unafraid (Wiz tonal benchmark).

  strategic_frame: >
    Per Tomer Poran (2026-05-06): Alice plays on the RISK side of the
    risk-vs-capability split. Risk = making sure AI doesn't do what it's
    not supposed to do. Capability = making sure AI does what it IS
    supposed to do. Capability players (Scale AI, Surge AI, Turing,
    Toloka, Prolific, Handshake, Mercor) compete on data volume and
    breadth — Alice does NOT compete there. Alice's wedge is SPECIALISM
    in risk, privacy, compliance, bias, deception. "We are not
    generalists." Drafted action_text should never position Alice as a
    Scale/Surge/Prolific competitor — those are generalists, Alice is
    the specialist.

  two_public_brand_proposal: >
    Per Tomer's website-rehaul proposal (not yet final — conflict with
    Noam's 3-brand framing pending). Two surfaces:
      Alice = the product (WonderSuite). Automated AI security for
        GenAI consumer-facing apps in enterprises. Competes with
        Palo Alto Networks, Zscaler.
      Alice Labs = expertise + services. Red teaming, data services,
        policy & enforcement advisory, RL infrastructure, intelligence.
        Frontier labs + GenAI-native + T&S customers.
        Aspirational reference: Irregular.
  brand_principles_summary: >
    Research-first, not marketing-first. Human opinion, not AI. Recognizably
    Alice. POV in everything. No AI slop. No gimmicks. Would Alice's own
    300 people share it unprompted?

projection:
  signal_room:

    pillars:
      - id: P1
        name: Customer-facing chatbot failures & brand harm
        why: >
          The John Oliver lane. Every time a brand chatbot lies, sycophants,
          or harms a user in public, Alice's pitch ("we test before launch,
          guard at runtime, re-test in production") gets sharper. Track
          incidents, the discourse around them, and the legal/regulatory
          response (AB 1988, consumer lawsuits, FTC actions).
        keywords:
          - brand chatbot fail
          - customer service ai
          - chatbot scandal
          - ai hallucination consumer
          - sycophancy chatbot
          - ab 1988
          - chatbot lawsuit
          - chatbot lied
          - generative ai consumer harm
          - support bot failure

      - id: P2
